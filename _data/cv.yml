    Projects:
      - name: RAFT-Stereo Optimization and Lightweight Deployment
        summary: Optimized RAFT-Stereo for binocular stereo matching, focusing on refinement strategies, edge-aware loss, partial parameter unfreezing, and FP16 inference acceleration.
        highlights:
          - Built experiments on the Middlebury2014 stereo dataset.
          - Compared baseline, refinement-only training, refinement with edge-aware loss, and partial unfreezing.
          - Reduced model size from about 43 MB to 22 MB with FP16 inference and improved inference speed from about 209.80 ms to 173.59 ms per image pair while maintaining comparable accuracy.

      - name: Competitive Price Monitoring System for E-commerce
        summary: Python and Playwright-based automation system for SKU-level price monitoring across Taobao/Tmall stores.
        highlights:
          - Designed browser automation workflows for collecting product information and SKU-level pricing.
          - Explored LLM-based SKU normalization and product model matching.

      - name: Self-hosted Personal Infrastructure
        summary: Personal web systems and self-hosted services deployed around the somnus.top domain.
        highlights:
          - Built websites and documentation systems with Hugo, Quartz, Ghost, Jekyll, and GitHub Pages.
          - Deployed services including Vaultwarden, AFFiNE, Uptime Kuma, and Caddy reverse proxy.

