name: Visual smoke checks

on:
  pull_request:
    branches: [main, master]
    paths:
      - "config.toml"
      - "content/**"
      - "sass/**"
      - "static/**"
      - "templates/**"
      - ".github/workflows/visual-regression.yml"
  push:
    branches: [main, master]
    paths:
      - "config.toml"
      - "content/**"
      - "sass/**"
      - "static/**"
      - "templates/**"
      - ".github/workflows/visual-regression.yml"

jobs:
  visual-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Zola site
        run: docker run --rm -v "$PWD":/site -w /site ghcr.io/getzola/zola:v0.22.1 build

      - name: Smoke test generated pages
        run: |
          python3 -m http.server 8080 --directory public &
          for path in / /projects/ /news/ /cv/; do
            curl -fsS "http://127.0.0.1:8080${path}" >/dev/null
          done
