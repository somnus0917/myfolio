name: Axe accessibility testing

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Path to be checked, for example projects/"
        required: false
        default: ""

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Zola site
        run: docker run --rm -v "$PWD":/site -w /site ghcr.io/getzola/zola:v0.22.1 build

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run axe
        run: |
          pnpm dlx http-server public/ -p 8080 &
          pnpm dlx @axe-core/cli http://localhost:8080/${{ github.event.inputs.url }} --load-delay=1500 --exit
