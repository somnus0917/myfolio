name: Zola checks

on:
  push:
    branches:
      - master
      - main
    paths:
      - "config.toml"
      - "content/**"
      - "sass/**"
      - "static/**"
      - "templates/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/unit-tests.yml"
  pull_request:
    branches:
      - master
      - main
    paths:
      - "config.toml"
      - "content/**"
      - "sass/**"
      - "static/**"
      - "templates/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/unit-tests.yml"

jobs:
  zola-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install JS deps
        run: npm ci

      - name: Check formatting
        run: npm run lint:prettier

      - name: Check Zola site
        run: docker run --rm -v "$PWD":/site -w /site ghcr.io/getzola/zola:v0.22.1 check --skip-external-links

      - name: Build Zola site
        run: docker run --rm -v "$PWD":/site -w /site ghcr.io/getzola/zola:v0.22.1 build
