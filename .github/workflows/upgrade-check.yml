name: Zola upgrade check

on:
  push:
    branches:
      - master
      - main
    paths:
      - "config.toml"
      - "content/**"
      - "sass/**"
      - "static/**"
      - "templates/**"
      - ".github/workflows/upgrade-check.yml"
  pull_request:
    branches:
      - master
      - main
    paths:
      - "config.toml"
      - "content/**"
      - "sass/**"
      - "static/**"
      - "templates/**"
      - ".github/workflows/upgrade-check.yml"

jobs:
  zola-version-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print pinned Zola version
        run: docker run --rm ghcr.io/getzola/zola:v0.22.1 --version

      - name: Check Zola site
        run: docker run --rm -v "$PWD":/site -w /site ghcr.io/getzola/zola:v0.22.1 check --skip-external-links
